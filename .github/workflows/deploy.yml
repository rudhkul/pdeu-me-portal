name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_DATA_REPO_OWNER: ${{ secrets.VITE_DATA_REPO_OWNER }}
          VITE_DATA_REPO_NAME:  ${{ secrets.VITE_DATA_REPO_NAME }}
          VITE_GITHUB_PAT:      ${{ secrets.VITE_GITHUB_PAT }}
          VITE_AUTH_SECRET:     ${{ secrets.VITE_AUTH_SECRET }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
